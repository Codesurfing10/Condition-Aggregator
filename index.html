<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condition Aggregator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="./app.js" defer></script>
</head>
<body>
    <h1>Welcome to Condition Aggregator</h1>
    <form id="routeForm">
        <input type="text" id="start" placeholder="Start Location" />
        <input type="text" id="end" placeholder="End Location" />
        <button type="submit">Compute Route</button>
    </form>
    <div id="map" style="height: 500px;"></div>
    <div id="plotlyChart"></div>
</body>
</html>
